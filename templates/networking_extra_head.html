<!-- networking_extra_head.html -->
<link rel="stylesheet" type="text/css" href="/static/css/flvChart.css" />
<style>
/* Dashboard header - usa classi utility da custom.css */
.dashboard-header {
  margin-bottom: var(--space-4);
}

.dashboard-header h1 {
  margin-bottom: var(--space-1);
}

/* Dashboard grid - estende utility classes */
.dashboard-grid {
  display: grid;
  gap: var(--space-4);
  grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
}

.dashboard-meta {
  margin-top: var(--space-4);
}

/* Network tables */
.network-table-wrapper {
  overflow-x: auto;
  margin-top: var(--space-3);
  max-width: 100%;
  -webkit-overflow-scrolling: touch;
  border-radius: var(--radius-md);
}

.network-table {
  width: 100%;
  min-width: 600px;
  border-collapse: collapse;
  font-size: var(--text-sm);
}

.network-table th {
  text-align: left;
  padding: var(--space-2) var(--space-3);
  border-bottom: 2px solid var(--border);
  color: var(--text-muted);
  font-weight: 600;
  font-size: var(--text-xs);
  text-transform: uppercase;
  letter-spacing: 0.025em;
  white-space: nowrap;
}

.network-table td {
  padding: var(--space-3) var(--space-3);
  border-bottom: 1px solid var(--surface-2);
  font-family: var(--font-family-mono);
  font-size: var(--text-sm);
}

.network-table tr:last-child td {
  border-bottom: none;
}

.network-table tr:hover {
  background: var(--surface-2);
}

/* Stats grid - usa variabili spaziatura */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: var(--space-4);
  margin-top: var(--space-4);
}

@media (max-width: 640px) {
  .stats-grid {
    gap: var(--space-2);
  }

  .stat-box {
    padding: var(--space-3);
  }
}

.stat-box {
  background: var(--surface-2);
  padding: var(--space-4);
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  transition: all var(--transition-fast);
}

.stat-box:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-sm);
}

.stat-box .label {
  color: var(--text-muted);
  font-size: var(--text-sm);
  margin-bottom: var(--space-1);
}

.stat-box .value {
  font-size: var(--text-2xl);
  font-weight: 700;
  color: var(--primary);
}

/* Flags and status badges */
.badge {
  display: inline-block;
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-sm);
  font-size: var(--text-xs);
  font-weight: 600;
  margin: 0 var(--space-1);
}

.badge-success {
  background: var(--success);
  color: white;
}

.badge-warning {
  background: var(--warning);
  color: white;
}

.badge-danger {
  background: var(--danger);
  color: white;
}

.badge-info {
  background: #4b7bc9;
  color: white;
}

/* Code blocks */
.code-block {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: var(--space-4);
  font-family: var(--font-family-mono);
  font-size: var(--text-sm);
  overflow-x: auto;
  margin-top: var(--space-2);
}

/* Chart layouts */
.chart-panel {
  grid-column: 1 / -1;
}

.chart-grid {
  display: grid;
  gap: var(--space-4);
  grid-template-columns: repeat(auto-fit, minmax(min(100%, 340px), 1fr));
}

.chart-grid-two {
  grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr));
}

.flvchart-canvas {
  width: 100% !important;
  height: 220px !important;
}

/* Responsive adjustments */
@media (max-width: 767px) {
  .flvchart-canvas {
    height: 200px !important;
  }

  .chart-grid {
    grid-template-columns: 1fr;
  }
}
</style>
