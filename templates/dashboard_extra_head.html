<!-- dashboard_extra_head.html - Per page custom CSS  -->
<link rel="stylesheet" type="text/css" href="/static/css/flvChart.css" />
<style>
/* Dashboard header - usa utility classes */
.dashboard-header {
  margin-bottom: var(--space-4);
}

.dashboard-header h1 {
  margin-bottom: var(--space-1);
}

/* Dashboard grid */
.dashboard-grid {
  display: grid;
  gap: var(--space-4);
  grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
}

.chart-panel {
  grid-column: 1 / -1;
}

.chart-grid {
  display: grid;
  gap: var(--space-4);
  grid-template-columns: repeat(auto-fit, minmax(min(100%, 340px), 1fr));
}

.flvchart-wrap {
  margin-top: var(--space-3);
}

/* Chart canvas — altezza responsiva */
.flvchart-canvas {
  width: 100% !important;
  height: 260px !important;
}

@media (max-width: 767px) {
  .flvchart-canvas {
    height: 220px !important;
  }

  .chart-grid {
    grid-template-columns: 1fr;
  }

  .flvchart-card {
    min-height: 280px;
  }
}

@media (max-width: 480px) {
  .flvchart-canvas {
    height: 200px !important;
  }
}

/* Statistiche */
.stat-value {
  font-size: var(--text-2xl);
  font-weight: 700;
  color: var(--primary);
}

.progress {
  width: 100%;
  height: 8px;
  background: var(--surface-2);
  border-radius: 999px;
  overflow: hidden;
}

.progress > span {
  display: block;
  height: 100%;
  background: var(--primary);
  transition: width var(--transition-base);
}

.kv {
  display: flex;
  justify-content: space-between;
  gap: var(--space-4);
  font-size: var(--text-sm);
}

.dashboard-meta {
  margin-top: var(--space-4);
}

/* Process table styles */
.process-table-wrapper {
  overflow-x: auto;
  overflow-y: hidden;
  margin-top: var(--space-3);
  max-width: 100%;
  -webkit-overflow-scrolling: touch;
  border-radius: var(--radius-md);
}

.process-table {
  width: 100%;
  min-width: 500px;
  border-collapse: collapse;
  font-size: var(--text-sm);
}

.process-table th {
  text-align: left;
  padding: var(--space-2) var(--space-3);
  border-bottom: 2px solid var(--border);
  color: var(--text-muted);
  font-weight: 600;
  font-size: var(--text-xs);
  text-transform: uppercase;
  letter-spacing: 0.025em;
  white-space: nowrap;
}

.process-table td {
  padding: var(--space-3) var(--space-3);
  border-bottom: 1px solid var(--surface-2);
}

.process-table tr:last-child td {
  border-bottom: none;
}

.process-table tr:hover {
  background: var(--surface-2);
}

.process-cmd {
  font-family: var(--font-family-mono);
  color: var(--text-muted);
  font-size: var(--text-sm);
  word-break: break-all;
  max-width: 200px;
}

/* Layout speciali per tabelle */
.dashboard-grid:has(.process-table) {
  grid-template-columns: 1fr;
}

.dashboard-grid:has(.process-table) > article {
  grid-column: 1;
  max-width: 100%;
  overflow: hidden;
}

@media (min-width: 768px) {
  .process-table {
    min-width: 600px;
  }

  .process-cmd {
    max-width: 300px;
  }
}

/* Stat cards */
.stat-card {
  padding: var(--space-4);
}

.stat-card h3 {
  font-size: var(--text-lg);
  margin-bottom: var(--space-3);
  color: var(--text);
}
</style>
